 <!DOCTYPE html> <html lang="en">  <head>  <meta charset="utf-8"/>  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>  <title>  404 - Page Not Found  </title>  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>  <style>  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');   body {  background-color: #1a202c;  color: #ffffff;  font-family: 'Roboto', sans-serif;  display: flex;  align-items: center;  justify-content: center;  min-height: 100vh;  margin: 0;  }   .container {  text-align: center;  padding: 1.5rem;  max-width: 600px;  margin: auto;  animation: fadeIn 1s ease-in-out;  }   .container img {  width: 200px;  height: 200px;  margin-bottom: 1.5rem;  animation: bounce 2s infinite;  }   .container h1 {  font-size: 4rem;  font-weight: bold;  margin-bottom: 1rem;  animation: fadeInDown 1s ease-in-out;  }   .container h2 {  font-size: 1.5rem;  margin-bottom: 1rem;  animation: fadeInUp 1s ease-in-out;  }   .container p {  color: #a0aec0;  margin-bottom: 1.5rem;  animation: fadeIn 1.5s ease-in-out;  }   .buttons {  display: flex;  justify-content: center;  gap: 1rem;  animation: fadeInUp 1.5s ease-in-out;  }   .button {  padding: 0.75rem 1.5rem;  border-radius: 9999px;  text-decoration: none;  font-weight: 700;  transition: all 0.3s ease;  display: inline-flex;  align-items: center;  }   .button-primary {  background-color: #3182ce;  color: #ffffff;  }   .button-primary:hover {  background-color: #2b6cb0;  transform: translateY(-3px);  }   .button-secondary {  background-color: transparent;  color: #3182ce;  border: 2px solid #3182ce;  }   .button-secondary:hover {  background-color: #3182ce;  color: #ffffff;  transform: translateY(-3px);  }   @keyframes bounce {  0%, 100% { transform: translateY(0); }  50% { transform: translateY(-20px); }  }   @keyframes fadeIn {  from { opacity: 0; }  to { opacity: 1; }  }   @keyframes fadeInDown {  from { opacity: 0; transform: translateY(-20px); }  to { opacity: 1; transform: translateY(0); }  }   @keyframes fadeInUp {  from { opacity: 0; transform: translateY(20px); }  to { opacity: 1; transform: translateY(0); }  }  </style>  </head>  <body>  <div class="container">  <img alt="A decorative image representing a 404 error with a broken robot" height="200" src="/assets/images/404error.webp" width="200"/>  <h1>  404  </h1>  <h2>  Oops! Page Not Found  </h2>  <p>  The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.  </p>  <div class="buttons">  <a class="button button-primary" href="/">  <i class="fas fa-home mr-2">  </i>  Go Home  </a>  <a class="button button-secondary" href="/contact.php">  <i class="fas fa-envelope mr-2">  </i>  Contact Us  </a>  </div>  </div>  </body> </html>
